name: Deploy Website

on:
  push:
    branches: [main, dev]
    paths:
      - 'webseite/**'
      - 'deploy/docker-compose.prod.yml'

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/ahub88/knipserl/website

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "service=knipserl-web-prod" >> $GITHUB_OUTPUT
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "env=production" >> $GITHUB_OUTPUT
          else
            echo "service=knipserl-web-dev" >> $GITHUB_OUTPUT
            echo "tag=dev" >> $GITHUB_OUTPUT
            echo "env=staging" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./webseite
          push: true
          tags: ${{ env.IMAGE }}:${{ steps.env.outputs.tag }}
          cache-from: type=gha
          cache-to: type=inline

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/knipserl/deploy

            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.CR_PAT }}
            docker pull ${{ env.IMAGE }}:${{ steps.env.outputs.tag }}

            git fetch origin ${{ github.ref_name }}
            git checkout ${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}

            docker compose -f docker-compose.prod.yml up -d ${{ steps.env.outputs.service }}
            docker image prune -f

            # Purge Varnish cache for this site
            DOMAIN="${{ steps.env.outputs.env == 'production' && 'www.knipserl.de' || 'dev.knipserl.de' }}"
            if command -v varnishadm &> /dev/null; then
              varnishadm "ban req.http.host == ${DOMAIN}"
              echo "✓ Varnish cache purged for ${DOMAIN}"
            elif curl -s -o /dev/null -w "%{http_code}" -X PURGE "http://127.0.0.1:6081/" -H "Host: ${DOMAIN}" | grep -q "200"; then
              echo "✓ Varnish cache purged via PURGE request for ${DOMAIN}"
            else
              echo "⚠ Varnish purge skipped (varnishadm not available or PURGE failed)"
            fi

            echo "✓ Website (${{ steps.env.outputs.env }}) deployed successfully"
