# Host-Netzwerk erforderlich da Server in LXC-Container läuft.
# Container binden direkt auf localhost-Ports, NGINX/ISPConfig leitet von außen weiter.

services:
  # === DATABASE ===
  knipserl-db:
    image: postgres:16-alpine
    container_name: knipserl-db
    restart: unless-stopped
    network_mode: host
    environment:
      POSTGRES_USER: knipserl
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: knipserl
      PGPORT: "5433"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knipserl -d knipserl -p 5433"]
      interval: 5s
      timeout: 3s
      retries: 5

  # === ADMIN DASHBOARD (Production) ===
  knipserl-admin-prod:
    image: ghcr.io/ahub88/knipserl/admin:latest
    container_name: knipserl-admin-prod
    restart: unless-stopped
    network_mode: host
    depends_on:
      knipserl-db:
        condition: service_healthy
    volumes:
      - uploads-prod:/app/uploads
    environment:
      DATABASE_URL: "postgresql://knipserl:${DB_PASSWORD}@127.0.0.1:5433/knipserl?schema=public"
      AUTH_SECRET: ${AUTH_SECRET}
      NEXT_PUBLIC_APP_URL: "https://admin.knipserl.de"
      AUTH_TRUST_HOST: "true"
      PORT: "3001"
      HOSTNAME: "127.0.0.1"
      AZURE_TENANT_ID: ${AZURE_TENANT_ID}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET}
      MAIL_FROM: ${MAIL_FROM:-info@knipserl.de}

  # === ADMIN DASHBOARD (Dev/Staging) ===
  knipserl-admin-dev:
    image: ghcr.io/ahub88/knipserl/admin:dev
    container_name: knipserl-admin-dev
    restart: unless-stopped
    network_mode: host
    depends_on:
      knipserl-db:
        condition: service_healthy
    volumes:
      - uploads-dev:/app/uploads
    environment:
      DATABASE_URL: "postgresql://knipserl:${DB_PASSWORD}@127.0.0.1:5433/knipserl_dev?schema=public"
      AUTH_SECRET: ${AUTH_SECRET_DEV}
      NEXT_PUBLIC_APP_URL: "https://dev-admin.knipserl.de"
      AUTH_TRUST_HOST: "true"
      PORT: "3002"
      HOSTNAME: "127.0.0.1"
      AZURE_TENANT_ID: ${AZURE_TENANT_ID}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET}
      MAIL_FROM: ${MAIL_FROM:-info@knipserl.de}

  # === WEBSITE (Dev/Staging) ===
  knipserl-web-dev:
    image: ghcr.io/ahub88/knipserl/website:dev
    container_name: knipserl-web-dev
    restart: unless-stopped
    network_mode: host
    environment:
      NEXT_PUBLIC_SITE_URL: "https://dev.knipserl.de"
      NEXT_PUBLIC_ENV: "staging"
      SITE_ENV: "staging"
      ADMIN_API_URL: "http://127.0.0.1:3002"
      ADMIN_PUBLIC_URL: "https://dev-admin.knipserl.de"
      PORT: "3004"
      HOSTNAME: "127.0.0.1"

  # === WEBSITE (Production) — NICHT STARTEN bis Freigabe! ===
  # knipserl-web-prod:
  #   image: ghcr.io/ahub88/knipserl/website:latest
  #   container_name: knipserl-web-prod
  #   restart: unless-stopped
  #   network_mode: host
  #   environment:
  #     NEXT_PUBLIC_SITE_URL: "https://www.knipserl.de"
  #     ADMIN_API_URL: "http://127.0.0.1:3001"
  #     ADMIN_PUBLIC_URL: "https://admin.knipserl.de"
  #     PORT: "3003"
  #     HOSTNAME: "127.0.0.1"

volumes:
  pgdata:
  uploads-prod:
  uploads-dev:
